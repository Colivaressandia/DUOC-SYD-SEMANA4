version: '3.8'

services:
  # Base de Datos MySQL
  db:
    image: mysql:8.0
    container_name: mysql-veterinaria
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: veterinaria_db
    ports:
      - "3307:3306"  # <-- Cambiado a 3307 para evitar conflicto con MySQL local

  # Herramienta de Análisis Estático
  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube-server
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonar_data:/opt/sonarqube/data

  # Herramienta de CI/CD
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-server
    privileged: true
    user: root
    ports:
      - "8081:8080"  # <-- Cambiado a 8081 para evitar conflicto con Jenkins/Oracle local
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  sonar_data:
  jenkins_home: